name: Fork Sync

on:
  schedule:
    - cron: "0 3 * * *"     # 每天执行一次（UTC 03:00，北京时间 11:00）
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT != '' && secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Configure Git and remotes
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail

          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main || git checkout -b main

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/imzyb/MiSub.git
          else
            git remote add upstream https://github.com/imzyb/MiSub.git
          fi

          if [ -n "${SYNC_PAT:-}" ]; then
            git remote set-url origin "https://x-access-token:${SYNC_PAT}@github.com/${{ github.repository }}.git"
            echo "✅ 检测到 SYNC_PAT，将使用 PAT 推送（支持同步 .github/workflows）。"
          else
            echo "⚠️ 未配置 SYNC_PAT，将使用默认 GITHUB_TOKEN。"
            echo "⚠️ 若上游包含 workflow 文件变更，GitHub 会拒绝 GITHUB_TOKEN 推送；请配置带 workflow 权限的 SYNC_PAT。"
          fi

          git fetch --prune origin main
          git fetch --prune upstream main

      - name: Mirror upstream main
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail

          ORIGIN_SHA="$(git rev-parse origin/main)"
          UPSTREAM_SHA="$(git rev-parse upstream/main)"

          echo "origin/main:   ${ORIGIN_SHA}"
          echo "upstream/main: ${UPSTREAM_SHA}"

          if [ "${ORIGIN_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "✨ Fork 已与上游完全一致，无需同步。"
            exit 0
          fi

          if [ -z "${SYNC_PAT:-}" ]; then
            WORKFLOW_DIFF="$(git diff --name-only "${ORIGIN_SHA}" "${UPSTREAM_SHA}" -- .github/workflows || true)"
            if [ -n "${WORKFLOW_DIFF}" ]; then
              echo "⚠️ 上游包含 .github/workflows 变更，但当前未配置 SYNC_PAT："
              echo "${WORKFLOW_DIFF}"
              echo "GitHub 默认 GITHUB_TOKEN 不能创建/更新 workflow 文件。"
              echo "::notice title=Fork Sync skipped::上游包含 workflow 文件变更。请在 fork 仓库配置 secret：SYNC_PAT（repo + workflow 权限）后手动重新运行，或在 GitHub 页面使用 Sync fork/Discard commits 手动同步。"
              exit 0
            fi
          fi

          # 关键：不要 merge upstream/main。
          # merge 会在 fork 里产生“Auto-sync”提交，导致 GitHub 显示 ahead of upstream，
          # 从而让网页端 Sync fork 只能提示丢弃提交。
          # reset + force-with-lease 让 fork/main 精确镜像 upstream/main。
          git reset --hard upstream/main

          echo "🚀 正在将 fork/main 快照同步为 upstream/main..."
          git push --force-with-lease origin main
